project:
  title: "2x2 Pipelined Systolic Array"
  author: "Your Name"
  description: "A 2x2 systolic array for matrix multiplication with serial I/O interface"
  language: "Verilog"
  clock_hz: 50000000

  # Top module info
  top_module: "tt_um_systolic_array"
  
  # Source files MUST include the src/ prefix
  source_files:
    - src/systolic_pe.v
    - src/systolic_array_2x2.v
    - src/tt_um_systolic_array.v

  # Pin assignments
  pinout:
    ui[0]: "Command: start_load_a"
    ui[1]: "Command: start_load_b"
    ui[2]: "Command: start_compute"
    ui[3]: "Command: start_read"
    ui[4]: "Data input bit 0"
    ui[5]: "Data input bit 1"
    ui[6]: "Data input bit 2"
    ui[7]: "Data input bit 3"
    uo[0]: "Result bit 0"
    uo[1]: "Result bit 1"
    uo[2]: "Result bit 2"
    uo[3]: "Result bit 3"
    uo[4]: "Result bit 4"
    uo[5]: "Result bit 5"
    uo[6]: "Result bit 6"
    uo[7]: "Result bit 7"
    uio[0]: "Unused"
    uio[1]: "Unused"
    uio[2]: "Unused"
    uio[3]: "Unused"
    uio[4]: "Unused"
    uio[5]: "Unused"
    uio[6]: "Unused"
    uio[7]: "Unused"
