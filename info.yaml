project:
  title: "2x2 Pipelined Systolic Array"
  author: "Your Name"
  description: "A 2x2 systolic array for matrix multiplication with serial I/O interface"
  language: "Verilog"
  clock_hz: 50000000  # 50MHz recommended

  # Top module info
  top_module: "tt_um_systolic_array"
  
  # Source files in compilation order
  source_files:
    - systolic_pe.sv
    - systolic_array_2x2.sv
    - tt_um_systolic_array.sv

  # Pin assignments
  pinout:
    ui[7:4]: "4-bit data input for matrix elements"
    ui[3]: "Command: start_read (read results)"
    ui[2]: "Command: start_compute (begin computation)"
    ui[1]: "Command: start_load_b (load matrix B)"
    ui[0]: "Command: start_load_a (load matrix A)"
    uo[7:0]: "8-bit output for results (serial readout)"
    uio[7:0]: "Unused bidirectional pins"

documentation:
  how_it_works: |
    This design implements a 2x2 systolic array for matrix multiplication.
    
    The systolic array consists of 4 processing elements (PEs) arranged in a 
    2x2 grid. Each PE performs a multiply-accumulate (MAC) operation and 
    passes data to neighboring PEs in a pipelined fashion.
    
    The design uses a serial interface to load two 2x2 matrices (A and B),
    performs the multiplication C = A * B, and outputs the result matrix C
    serially.
    
    Data width is 4 bits per element to fit within area constraints.
    
  how_to_test: |
    1. Assert reset (rst_n = 0), then release (rst_n = 1)
    2. Load Matrix A:
       - Set ui[0] = 1 (cmd_load_a)
       - Send 4 elements via ui[7:4]: A[0][0], A[0][1], A[1][0], A[1][1]
       - Each element sent on a separate clock cycle
    3. Load Matrix B:
       - Set ui[1] = 1 (cmd_load_b)
       - Send 4 elements via ui[7:4]: B[0][0], B[0][1], B[1][0], B[1][1]
    4. Start computation:
       - Set ui[2] = 1 (cmd_compute)
       - Wait ~10 clock cycles for computation
    5. Read results:
       - Set ui[3] = 1 (cmd_read)
       - Read 4 results from uo[7:0]: C[0][0], C[0][1], C[1][0], C[1][1]
    
    Example: A = [[2,3],[4,5]], B = [[1,2],[3,4]]
    Expected: C = [[11,16],[19,28]]
